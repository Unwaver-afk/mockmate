<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>PrepMaster AI - Login</title>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.fill {

    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-background text-on-surface font-body min-h-screen flex flex-col antialiased selection:bg-primary-container selection:text-on-primary-container">
<!-- Note: TopAppBar and Navigation suppressed as this is a transactional Login page -->
<main class="flex-grow flex items-center justify-center p-6 sm:p-12 relative overflow-hidden">
<!-- Background decorative elements for physical space feel -->
<div class="absolute inset-0 z-0 overflow-hidden pointer-events-none">
<div class="absolute -top-[20%] -right-[10%] w-[50vw] h-[50vw] rounded-full bg-secondary-container opacity-20 blur-[100px]"></div>
<div class="absolute -bottom-[20%] -left-[10%] w-[40vw] h-[40vw] rounded-full bg-primary-fixed opacity-30 blur-[120px]"></div>
</div>
<div class="relative z-10 w-full max-w-md">
<!-- Brand Anchor -->
<div class="text-center mb-10">
<div class="inline-flex items-center justify-center mb-4">
<span class="material-symbols-outlined fill text-4xl text-primary" data-icon="psychology">psychology</span>
</div>
<h1 class="font-display font-extrabold text-3xl sm:text-4xl tracking-tight bg-gradient-to-br from-primary to-primary-container bg-clip-text text-transparent mb-2">PrepMaster AI</h1>
<p class="font-body text-on-surface-variant text-base">Your Digital Mentor.</p>
</div>
<!-- Login Card Surface -->
<div class="bg-surface-container-lowest rounded-xl p-8 sm:p-10 shadow-[0_12px_32px_-4px_rgba(25,28,30,0.06)] relative">
<h2 class="font-headline font-bold text-2xl text-on-surface mb-8 text-center">Ready to Level Up?</h2>
<form action="#" class="space-y-6" method="POST">
<!-- Email Input -->
<div class="space-y-2">
<label class="block font-label text-sm font-semibold tracking-wider text-on-surface uppercase" for="email">Email</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none">
<span class="material-symbols-outlined text-outline-variant group-focus-within:text-primary transition-colors" data-icon="mail">mail</span>
</div>
<input class="block w-full rounded-xl border-0 py-3.5 pl-12 pr-4 bg-surface-container-low text-on-surface placeholder:text-outline-variant focus:ring-0 focus:bg-surface-container-lowest outline outline-1 outline-transparent focus:outline-surface-tint/20 transition-all duration-200 font-body text-base" id="email" name="email" placeholder="name@company.com" required="" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<div class="flex items-center justify-between">
<label class="block font-label text-sm font-semibold tracking-wider text-on-surface uppercase" for="password">Password</label>
<a class="font-label text-xs font-semibold text-primary hover:text-primary-container transition-colors tracking-wide" href="#">Forgot Password?</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none">
<span class="material-symbols-outlined text-outline-variant group-focus-within:text-primary transition-colors" data-icon="lock">lock</span>
</div>
<input class="block w-full rounded-xl border-0 py-3.5 pl-12 pr-12 bg-surface-container-low text-on-surface placeholder:text-outline-variant focus:ring-0 focus:bg-surface-container-lowest outline outline-1 outline-transparent focus:outline-surface-tint/20 transition-all duration-200 font-body text-base" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute inset-y-0 right-0 flex items-center pr-4 text-outline-variant hover:text-on-surface transition-colors focus:outline-none" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Submit Button -->
<button class="w-full flex justify-center py-4 px-4 rounded-xl text-sm font-bold font-headline text-on-primary-container bg-gradient-to-br from-primary to-primary-container hover:opacity-90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-all duration-200 shadow-sm mt-8" type="submit">
                        Sign In
                    </button>
</form>
<!-- Divider -->
<div class="mt-8 relative">
<div aria-hidden="true" class="absolute inset-0 flex items-center">
<div class="w-full h-[4px] bg-surface-container-low rounded-full"></div>
</div>
<div class="relative flex justify-center text-sm font-label uppercase tracking-widest">
<span class="px-4 bg-surface-container-lowest text-outline text-xs">Or continue with</span>
</div>
</div>
<!-- Social Logins -->
<div class="mt-8 grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-3 w-full rounded-xl py-3 px-4 bg-surface-container-low hover:bg-surface-container transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-outline-variant group outline outline-1 outline-transparent hover:outline-outline-variant/15 text-on-surface font-body text-sm font-medium" type="button">
<img alt="Google" class="w-5 h-5" data-alt="A small, crisp SVG icon of the standard Google 'G' logo, featuring its signature multi-colored segments (red, yellow, green, blue). The background is transparent. The lighting is neutral and digital. The mood is clean and recognizable." src="https://lh3.googleusercontent.com/aida-public/AB6AXuB-xLfJmQYpTEfKWPLABS-rTcw7PJxRE7NynceqIK-Q8itKwWBhCGE0fDnjduGEF_VqUGglcyNDl9vLbZ-7Jo9WYvAnhUvHG7ADAnlsDMbOu867xxptXlT1mj66TMKTlq8xn718k4EcgPR7yWXIsFMHvgsMPIr0MAhkDRWEHkMTh91rpdCFkV8fGHeiuQfSHfTranfq-39YmBYPe9zO64lR6RQZpp3YbJ3Br_LJAxWXh_Eswy9Ln2SEe75QKkzi1W9V2zrTL5nhXMk"/>
                        Google
                    </button>
<button class="flex items-center justify-center gap-3 w-full rounded-xl py-3 px-4 bg-surface-container-low hover:bg-surface-container transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-outline-variant group outline outline-1 outline-transparent hover:outline-outline-variant/15 text-on-surface font-body text-sm font-medium" type="button">
<img alt="LinkedIn" class="w-5 h-5" data-alt="A small, crisp PNG icon of the standard LinkedIn 'in' logo, featuring the white letters 'in' inside a solid blue rounded square. The background is transparent. The lighting is neutral and digital. The mood is professional and recognizable." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCajfa-g-6sSI-nAA_aXgIu9Py1CaRd7vdqGAlBkfjtgvMtw4BgyXZ6JGET83tKEn98yWzcVw06y4Z8RNnlNDzEgYdq2MVrjUJVIlJySwNt1ulvBv3-rZqbj3R1BAcXRrD7fCagnY-vqiMgpbHOHTYLeXscptxb6NE3pvQF591-821GgTePtuJojNaV_0oc3bvC9rkV9-NK9Qd1TCPH9JfTOOZxlv0hDyg7kXdrUET-CpiV62402Ri3o5qU0upTSSt6-dVYRiK-ShI"/>
                        LinkedIn
                    </button>
</div>
</div>
<!-- Footer Link -->
<p class="mt-8 text-center text-sm font-body text-on-surface-variant">
                Don't have an account? 
                <a class="font-semibold text-primary hover:text-primary-container transition-colors" href="#">Sign Up</a>
</p>
</div>
<!-- Floating Dark Mode Toggle (Suppressed from missing TopAppBar) -->
<button class="absolute top-6 right-6 p-2 rounded-full bg-surface-container-lowest shadow-[0_4px_12px_rgba(25,28,30,0.05)] text-outline hover:text-primary transition-colors focus:outline-none" type="button">
<span class="material-symbols-outlined" data-icon="dark_mode">dark_mode</span>
</button>
</main>
</body></html>
